name: Keep Supabase alive

# Evita que o projeto Supabase (plano grátis) seja pausado por inatividade.
# Faz um ping leve no banco a cada 3 dias (e permite rodar manualmente).
# Configure os secrets do repositório: SUPABASE_URL e SUPABASE_ANON_KEY
# (Settings → Secrets and variables → Actions).

on:
  schedule:
    - cron: "0 6 */3 * *"   # a cada 3 dias, 06:00 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Secrets SUPABASE_URL / SUPABASE_ANON_KEY não configurados. Pulei o ping."
            exit 0
          fi
          # Consulta leve na tabela banners (conta como atividade no banco).
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/banners?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "HTTP $code"
          # 200 (ok) ou 401/403 (RLS) ainda contam como atividade; falha só em erro de rede/5xx.
          if [ "$code" -ge 500 ] || [ "$code" -eq 000 ]; then
            echo "Ping falhou (HTTP $code)"; exit 1
          fi
          echo "Ping OK — projeto mantido ativo."
